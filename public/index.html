<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détecteur de Brute Force</title>
<style>
  /* ===========================
   STYLE GENERAL
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body{
    min-height:100vh;
    padding:40px;

    background:
    linear-gradient(135deg,#0f2027,#203a43,#2c5364);

    color:white;
}

/* ===========================
   TITRE
=========================== */

h1{
    text-align:center;
    margin-bottom:35px;
    font-size:40px;
    letter-spacing:1px;
    text-shadow:0 5px 15px rgba(0,0,0,.3);
}

/* ===========================
   BOITE CONFIGURATION
=========================== */

.config{

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:20px;

    padding:25px;

    box-shadow:0 20px 40px rgba(0,0,0,.25);

    display:flex;

    justify-content:center;

    align-items:center;

    gap:15px;

    flex-wrap:wrap;
}

/* ===========================
   INPUT
=========================== */

input{

    width:90px;

    padding:10px;

    border:none;

    border-radius:10px;

    font-size:18px;

    text-align:center;

    outline:none;

    background:white;
}

/* ===========================
   BOUTON
=========================== */

button{

    padding:12px 24px;

    border:none;

    border-radius:12px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    color:white;

    background:linear-gradient(135deg,#00c6ff,#0072ff);

    transition:.3s;

    box-shadow:0 8px 20px rgba(0,114,255,.4);
}

button:hover{

    transform:translateY(-3px);

    box-shadow:0 15px 30px rgba(0,114,255,.6);
}

button:active{

    transform:scale(.97);
}

/* ===========================
   RESULTATS
=========================== */

.resultats{

    margin-top:35px;
}

/* ===========================
   STATISTIQUES
=========================== */

.stats{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

    gap:20px;

    margin-bottom:30px;
}

/* ===========================
   BOITES
=========================== */

.stat-box{

    padding:25px;

    border-radius:18px;

    text-align:center;

    color:white;

    transition:.3s;

    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.stat-box:hover{

    transform:translateY(-8px);
}

.stat-box:nth-child(1){

    background:linear-gradient(135deg,#00b09b,#96c93d);
}

.stat-box:nth-child(2){

    background:linear-gradient(135deg,#ff512f,#dd2476);
}

.stat-box:nth-child(3){

    background:linear-gradient(135deg,#396afc,#2948ff);
}

.stat-box:nth-child(4){

    background:linear-gradient(135deg,#ff9966,#ff5e62);
}

.valeur{

    font-size:38px;

    font-weight:bold;

    margin-bottom:8px;
}

.label{

    opacity:.9;
}

/* ===========================
   TABLEAUX
=========================== */

table{

    width:100%;

    border-collapse:collapse;

    margin-top:15px;

    overflow:hidden;

    border-radius:15px;

    background:white;

    color:#333;

    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

th{

    background:linear-gradient(135deg,#667eea,#764ba2);

    color:white;

    padding:15px;

    font-size:15px;
}

td{

    padding:14px;
}

tr:nth-child(even){

    background:#f3f6fb;
}

tr:hover{

    background:#dbeafe;

    transition:.3s;
}

/* ===========================
   ALERTE
=========================== */

.alerte{

    color:#ff1744;

    font-weight:bold;
}

/* ===========================
   TITRES
=========================== */

h3{

    margin-top:35px;

    margin-bottom:10px;

    font-size:24px;
}

/* ===========================
   RESPONSIVE
=========================== */

@media(max-width:700px){

    body{

        padding:20px;
    }

    h1{

        font-size:28px;
    }

    .config{

        flex-direction:column;
    }

}
</style>
</head>
<body>

<h1>🔍 Détecteur de Brute Force SSH</h1>

<div class="config">
  <label>Seuil d'alerte (tentatives échouées) : </label>
  <input type="number" id="seuil" value="5" min="1">
  <button onclick="lancerAnalyse()">Lancer l'analyse</button>
</div>

<div class="resultats" id="resultats"></div>

<script>
async function lancerAnalyse() {
  const seuil = document.getElementById('seuil').value;
  const div = document.getElementById('resultats');
  div.innerHTML = '<p>Analyse en cours...</p>';

  const reponse = await fetch('/api/analyser', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ seuil })
  });
  const data = await reponse.json();

  if (data.erreur) {
    div.innerHTML = `<p class="alerte">Erreur : ${data.erreur}</p>`;
    return;
  }

  let html = `
    <div class="stats">
      <div class="stat-box"><div class="valeur">${data.totalLignes}</div><div class="label">Lignes analysées</div></div>
      <div class="stat-box"><div class="valeur">${data.totalEchecs}</div><div class="label">Échecs</div></div>
      <div class="stat-box"><div class="valeur">${data.nbIPDistinctes}</div><div class="label">IP distinctes</div></div>
      <div class="stat-box"><div class="valeur">${data.suspectes.length}</div><div class="label">IP suspectes</div></div>
    </div>
  `;

  html += '<h3>⚠️ IP suspectes</h3>';
  if (data.suspectes.length === 0) {
    html += '<p>Aucune IP suspecte détectée.</p>';
  } else {
    html += '<table><tr><th>IP</th><th>Tentatives échouées</th></tr>';
    for (const s of data.suspectes) {
      html += `<tr class="alerte"><td>${s.ip}</td><td>${s.tentatives}</td></tr>`;
    }
    html += '</table>';
  }

  html += '<h3>Top utilisateurs ciblés</h3><table><tr><th>Utilisateur</th><th>Tentatives</th></tr>';
  for (const u of data.topUtilisateurs) {
    html += `<tr><td>${u.utilisateur}</td><td>${u.tentatives}</td></tr>`;
  }
  html += '</table>';

  div.innerHTML = html;
}
</script>

</body>
</html>
